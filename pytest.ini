# pytest configuration (repo root).
#
# import-mode=importlib lets test modules that share a basename across different
# packages coexist (e.g. tests/unit/reactive/test_types.py vs
# tests/unit/reactive/monitor/test_types.py, and test_params.py / test_scorer.py
# duplicated across spec test dirs). Under pytest's default "prepend" import mode
# these collide at collection time with an "import file mismatch" error, breaking
# the canonical `pytest tests/` run even though each spec's suite passes in
# isolation. importlib derives a unique module name from each file's path, so the
# duplicates no longer clash. Verified behavior-neutral for src-import resolution.
[pytest]
addopts = --import-mode=importlib
