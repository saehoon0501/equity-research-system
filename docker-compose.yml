services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: equity-research-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Tune for local dev — small machine, single connection load.
      # Production tuning lives elsewhere (this stack is for v0.1 paper-only use).
      TIMESCALEDB_TELEMETRY: "off"
    ports:
      # Bind localhost-only — the DB is for this machine's Claude Code session and
      # local MCP server. Do not expose to the LAN.
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # First-boot init scripts. Postgres image runs *.sql in alphabetical order,
      # ONLY on first initialization (when data dir is empty).
      # Subsequent migrations are NOT done via this directory — see db/README.md.
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
    name: equity-research-db-data
